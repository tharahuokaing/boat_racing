<!DOCTYPE html>
<html lang="km">
<head>

    <title>ពិធីអាពាហ៍ពិពាហ៍ - ប្រណាំងអ៊ុំទូក</title>
    <link rel="stylesheet" href="style.css">

<body>
    <header>
        <h1>សេចក្តីជូនដំណឹង និងអញ្ជើញចូលរួម</h1>
        <h2>ក្នុងពិធីសិរីមង្គលអាពាហ៍ពិពាហ៍</h2>

                <p>សូមអញ្ជើញចូលរួមក្នុងពិធីប្រណាំងអ៊ុំទូកជាពិសេស ក្នុងឱកាសអាពាហ៍ពិពាហ៍។</p>
                <div class="event-images">
                    <img src="https://www.tourismcambodia.com/img/pictures/water-festival-1030010.jpg?1550742632729" alt="Water Festival Boat Race">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSqQ_1Hi3F6JTuHu2CC-Wcg3wTZpFPzs2tzwQ&s" alt="Boat Racing Cambodia">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQavbsmU7qzRPnzmaLWO5sAPR129UKNC_UYcw&s" alt="Cambodian Boat Race">
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>© ពិធីអាពាហ៍ពិពាហ៍ ហួកាំង ថារ៉ា និង ខេន លីដា</p>
